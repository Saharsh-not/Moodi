# Project-wide Gradle settings.
# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Dhttps.protocols=TLSv1.2 -Djsse.enableSNIExtension=false

# System properties for HTTPS connections
systemProp.https.protocols=TLSv1.2
systemProp.https.keepAlive=false
systemProp.http.keepAlive=false

# AndroidX support
android.useAndroidX=true
android.enableJetifier=true

# When configured, Gradle will run in incubating parallel mode.
org.gradle.parallel=true
